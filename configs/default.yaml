seed: 2026
name: "exp"

data:
  dataset: "cifar10"
  distribution: "dirichlet"
  alpha: 0.5
  num_classes_per_client: 2

model:
  name: "simple_cnn"

fl:
  num_clients: 50
  clients_per_round: 10
  rounds: 60
  local_epochs: 5
  learning_rate: 0.01
  batch_size: 32

attack:
  type: "gaussian_noise"
  byzantine_pct: 0.10
  scale: 1.0

selection:
  strategy: "random"

aggregation:
  method: "fedavg"
  krum_m: 1
  trim_ratio: 0.1

logging:
  output_dir: "results"
  log_every: 1
